#==========================================================================
# Description: Rebuild LB2002 Armbian image from a ready base image
#==========================================================================

name: Build Armbian server image

permissions:
  contents: read

on:
  repository_dispatch:
  workflow_dispatch:
    inputs:
      base_image_url:
        description: "Direct URL to base Armbian .img.gz"
        required: false
        default: "https://github.com/ophub/amlogic-s9xxx-armbian/releases/download/Armbian_resolute_arm64_server_2026.07/Armbian_26.08.0_amlogic_s905l3a_resolute_6.12.94_server_2026.07.01.img.gz"
      armbian_board:
        description: "Select device board."
        required: false
        default: "s905l3a"
        type: choice
        options:
          - s905l3a
      armbian_kernel:
        description: "Select kernel version."
        required: false
        default: "6.12.95"
        type: choice
        options:
          - 6.12.y
          - 6.12.95
          - 6.12.94
          - 6.12.93
          - 6.12.91
          - 6.12.85
          - 6.18.y
          - 6.12.y_6.18.y
      kernel_repo:
        description: "Set the kernel repository."
        required: false
        default: "ejvo/amlogic-s9xxx-armbian_lb2002"
        type: choice
        options:
          - ophub/kernel
          - ejvo/amlogic-s9xxx-armbian_lb2002
      kernel_sign:
        description: "Expected immutable kernel asset signature."
        required: false
        default: "cm311hmi"
        type: choice
        options:
          - lb2002can
          - cm311hmi
          - ophub
      kernel_usage:
        description: "Set the tags of the stable kernel."
        required: false
        default: "stable"
        type: choice
        options:
          - stable
          - flippy
          - beta
      armbian_fstype:
        description: "Select armbian rootfs type."
        required: false
        default: "ext4"
        type: choice
        options:
          - ext4
          - btrfs
      builder_name:
        description: "Set Armbian builder signature."
        required: false
        default: "cm311"
        type: choice
        options:
          - ophub
          - angel
          - lb2002
          - cm311
      armbian_files:
        description: "Set the path of custom Armbian files."
        required: false
        default: "lb2002_dtb_research/armbian_files_cm311_hmi"
      include_hmi_offline_deps:
        description: "Embed CM311 HMI Debian packages and Python wheels for offline clean installs."
        required: false
        default: true
        type: boolean

env:
  TZ: Etc/UTC

jobs:
  build:
    runs-on: ubuntu-24.04
    if: ${{ github.event.repository.owner.id == github.event.sender.id }}

    steps:
      - name: Checkout
        uses: actions/checkout@v6

      - name: Preflight
        id: preflight
        run: |
          set -e
          custom_root="${{ github.workspace }}/${{ inputs.armbian_files }}"
          test -d "${custom_root}"
          test -f "${custom_root}/boot/uEnv.txt"
          cm311_final_edid="cm311_1280x720_v723_728_756_nhsync_nvsync.bin"
          grep -q "${cm311_final_edid}" "${custom_root}/boot/uEnv.txt"
          test -f "${custom_root}/usr/lib/firmware/edid/${cm311_final_edid}"
          fdt_rel="$(sed -n 's/^FDT=//p' "${custom_root}/boot/uEnv.txt" | head -n1 | sed 's#^/##')"
          test -n "${fdt_rel}"
          fdt_path="${custom_root}/boot/${fdt_rel}"
          if [ ! -f "${fdt_path}" ]; then
            test -f "${fdt_path%.dtb}.dts"
          fi

          board="$(printf '%s' "${{ inputs.armbian_board }}" | tr -d '\r' | xargs)"

          case "${board}" in
            s905l3a) ;;
            *)
              echo "error: unsupported armbian_board: ${board}"
              exit 1
              ;;
          esac

          echo "status=success" >> ${GITHUB_OUTPUT}

      - name: Initialize the build environment
        id: init
        if: ${{ steps.preflight.outputs.status == 'success' && !cancelled() }}
        env:
          DEBIAN_FRONTEND: noninteractive
        run: |
          set -e
          sudo -E apt-get -y update
          sudo -E apt-get -y install curl wget xz-utils pigz p7zip-full device-tree-compiler jq binutils python3-pip ca-certificates cpio u-boot-tools
          echo "status=success" >> ${GITHUB_OUTPUT}

      - name: Build CM311 HMI offline dependency bundle
        id: hmi_offline_deps
        if: ${{ inputs.include_hmi_offline_deps && steps.init.outputs.status == 'success' && !cancelled() }}
        env:
          DEBIAN_FRONTEND: noninteractive
        run: |
          set -euo pipefail
          custom_root="${{ github.workspace }}/${{ inputs.armbian_files }}"
          bundle="${custom_root}/opt/azs_host/cm311-offline-dependencies"
          rm -rf "${bundle}"
          mkdir -p "${bundle}/wheels" "${bundle}/debs/partial"

          python3 -m pip download \
            --disable-pip-version-check \
            --dest "${bundle}/wheels" \
            --only-binary=:all: \
            --platform manylinux_2_31_aarch64 \
            --implementation cp \
            --python-version 311 \
            --abi abi3 \
            PySide6_Essentials==6.6.3 \
            shiboken6==6.6.3

          python3 -m pip download \
            --disable-pip-version-check \
            --dest "${bundle}/wheels" \
            --only-binary=:all: \
            pyserial==3.5

          sudo dpkg --add-architecture arm64
          apt_source_dir="${RUNNER_TEMP:-/tmp}/cm311-apt-sources-${GITHUB_RUN_ID:-$$}"
          apt_lists_dir="${RUNNER_TEMP:-/tmp}/cm311-apt-lists-${GITHUB_RUN_ID:-$$}"
          cleanup_apt_tmp() {
            sudo rm -rf "${apt_source_dir:-}" "${apt_lists_dir:-}" "${bundle}/debs/partial" "${bundle}/debs/lock"
          }
          trap cleanup_apt_tmp EXIT
          mkdir -p "${apt_source_dir}" "${apt_lists_dir}/partial"
          cat <<'EOF' > "${apt_source_dir}/azs-resolute-arm64.sources"
          Types: deb
          URIs: http://ports.ubuntu.com/ubuntu-ports
          Suites: resolute resolute-updates resolute-security
          Components: main universe
          Architectures: arm64
          Signed-By: /usr/share/keyrings/ubuntu-archive-keyring.gpg
          EOF
          apt_opts=(
            -o "Dir::Etc::sourcelist=/dev/null"
            -o "Dir::Etc::sourceparts=${apt_source_dir}"
            -o "Dir::State::lists=${apt_lists_dir}"
            -o "APT::Architecture=arm64"
            -o "APT::Architectures=arm64"
          )
          if sudo -E apt-get "${apt_opts[@]}" -y update &&
             sudo -E apt-get -y --download-only \
               "${apt_opts[@]}" \
               -o Dir::Cache::archives="${bundle}/debs" \
               install \
               libdouble-conversion3:arm64 \
               libegl1:arm64 \
               libgl1:arm64 \
               libgbm1:arm64 \
               libglx0:arm64 \
               libx11-xcb1:arm64 \
               libxkbcommon0:arm64 \
               libfontconfig1:arm64 \
               libfreetype6:arm64 \
               libglib2.0-0:arm64 \
               libdbus-1-3:arm64 \
               libxcb1:arm64 \
               libxext6:arm64 \
               libxrender1:arm64 \
               libxi6:arm64 \
               libsm6:arm64 \
               libice6:arm64 \
               python3-yaml:arm64; then
            echo "Downloaded CM311 HMI arm64 Debian dependencies."
          else
            echo "::warning::CM311 HMI arm64 Debian dependency download failed; continuing with Python wheel offline bundle."
          fi
          cleanup_apt_tmp
          {
            echo "# CM311 HMI offline dependencies"
            echo
            echo "Base image: s905l3a_resolute_6.12.94"
            echo "Generated: $(date -u +%Y-%m-%dT%H:%M:%SZ)"
            echo
            echo "## wheels"
            find "${bundle}/wheels" -maxdepth 1 -type f -name '*.whl' -printf '%f\n' | sort
            echo
            echo "## debs"
            find "${bundle}/debs" -maxdepth 1 -type f -name '*.deb' -printf '%f\n' | sort
          } > "${bundle}/MANIFEST.md"
          test "$(find "${bundle}/wheels" -maxdepth 1 -type f -name '*.whl' | wc -l)" -ge 3

      - name: Create virtual disk for extended storage
        id: disk
        if: ${{ steps.init.outputs.status == 'success' && !cancelled() }}
        run: |
          set -e
          mnt_size=$(expr $(df -h /mnt | tail -1 | awk '{print $4}' | sed 's/[[:alpha:]]//g' | sed 's/\..*//') - 1)
          root_size=$(expr $(df -h / | tail -1 | awk '{print $4}' | sed 's/[[:alpha:]]//g' | sed 's/\..*//') - 4)
          sudo truncate -s "${mnt_size}"G /mnt/mnt.img
          sudo truncate -s "${root_size}"G /root.img
          sudo losetup /dev/loop6 /mnt/mnt.img
          sudo losetup /dev/loop7 /root.img
          sudo pvcreate /dev/loop6
          sudo pvcreate /dev/loop7
          sudo vgcreate github /dev/loop6 /dev/loop7
          sudo lvcreate -n runner -l 100%FREE github
          sudo mkfs.xfs -f -i sparse=0 -b size=4096 /dev/github/runner
          sudo mkdir -p /builder
          sudo mount /dev/github/runner /builder
          sudo chown -R runner:runner /builder
          df -Th
          echo "status=success" >> ${GITHUB_OUTPUT}

      - name: Download base image
        id: base
        if: ${{ steps.disk.outputs.status == 'success' && !cancelled() }}
        run: |
          set -e
          mkdir -p /builder/base
          cd /builder/base
          base_url="${{ inputs.base_image_url }}"
          base_gz="$(basename "${base_url%%\?*}")"
          case "${base_gz}" in
            *.img.gz) ;;
            *)
              echo "error: base_image_url must point to a .img.gz file: ${base_url}"
              exit 1
              ;;
          esac

          wget --tries=3 --retry-connrefused --waitretry=2 -O "${base_gz}" "${base_url}"
          gzip -df "${base_gz}"
          base_img="${base_gz%.gz}"
          test -f "${base_img}"

          # ophub ./rebuild only discovers source images matching *-trunk_*.img.
          # Preserve release and kernel version when we can, but always provide
          # a compatible fallback for newer upstream filename layouts.
          compat_img="$(printf '%s\n' "${base_img}" | sed -E 's#^Armbian_([^_]+)_(.*_(bookworm|trixie|resolute|noble))_([0-9]+\.[0-9]+\.[0-9]+)(_.*)?\.img$#Armbian-unofficial_\1-trunk_\2_\4.img#')"
          if [ "${compat_img}" = "${base_img}" ]; then
            release_ver="$(printf '%s\n' "${base_img}" | sed -nE 's#^Armbian_([^_]+)_.+#\1#p')"
            distro_ver="$(printf '%s\n' "${base_img}" | sed -nE 's#^Armbian_[^_]+_.*_(bookworm|trixie|resolute|noble)_([0-9]+\.[0-9]+\.[0-9]+).*$#\1#p')"
            kernel_ver="$(printf '%s\n' "${base_img}" | sed -nE 's#^Armbian_[^_]+_.*_(bookworm|trixie|resolute|noble)_([0-9]+\.[0-9]+\.[0-9]+).*$#\2#p')"
            test -n "${release_ver}"
            test -n "${kernel_ver}"
            test -n "${distro_ver}"
            compat_img="Armbian-unofficial_${release_ver}-trunk_amlogic_${{ inputs.armbian_board }}_${distro_ver}_${kernel_ver}.img"
          fi
          mv -f "${base_img}" "${compat_img}"
          ls -lh
          echo "status=success" >> ${GITHUB_OUTPUT}

      - name: Rebuild Armbian for target boards
        id: rebuild
        if: ${{ steps.base.outputs.status == 'success' && !cancelled() }}
        run: |
          set -e
          cd /builder
          rm -rf rebuild
          git clone -q --single-branch --depth=1 --branch=main https://github.com/ophub/amlogic-s9xxx-armbian.git rebuild

          mkdir -p rebuild/build/output/images
          cp -f /builder/base/*.img rebuild/build/output/images/

          custom_files="${{ github.workspace }}/${{ inputs.armbian_files }}"
          target_common="rebuild/build-armbian/armbian-files/common-files"
          target_bootfs="rebuild/build-armbian/armbian-files/different-files/${{ inputs.armbian_board }}/bootfs"
          model_conf="rebuild/build-armbian/armbian-files/common-files/etc/model_database.conf"
          mkdir -p "${target_common}" "${target_bootfs}"

          # Files under boot/ must land on the FAT boot partition for U-Boot.
          if [ -d "${custom_files}/boot" ]; then
            cp -avf --no-preserve=ownership "${custom_files}/boot/." "${target_bootfs}/"
          fi

          # Compile any local DTS overlays into DTB directly on the runner.
          if [ -d "${target_bootfs}/dtb/amlogic" ]; then
            while IFS= read -r dts; do
              dtb="${dts%.dts}.dtb"
              dts_dir="$(dirname "${dts}")"
              echo "Compiling local DTS: ${dts} -> ${dtb}"
              dtc -I dts -O dtb -i "${dts_dir}" -o "${dtb}" "${dts}"
            done < <(find "${target_bootfs}/dtb/amlogic" -maxdepth 1 -type f -name '*.dts' ! -name '*.full.dts' | sort)
          fi

          # ophub ./rebuild rewrites uEnv.txt from model_database.conf during
          # refactor_bootfs(), so force that board entry to our custom DTB.
          custom_fdt_name="$(sed -n 's/^FDT=\/dtb\/amlogic\///p' "${custom_files}/boot/uEnv.txt" | head -n1 | tr -d '\r')"
          test -n "${custom_fdt_name}"
          test -f "${model_conf}"
          awk -F: -v OFS=: -v board="${{ inputs.armbian_board }}" -v fdt="${custom_fdt_name}" '
            {
              board_field = $14
              gsub(/^[[:space:]]+|[[:space:]]+$/, "", board_field)
            }
            board_field == board { $4 = fdt }
            { print }
          ' "${model_conf}" > "${model_conf}.tmp"
          mv -f "${model_conf}.tmp" "${model_conf}"
          echo "Forced model_database.conf FDTFILE for board=${{ inputs.armbian_board }} to ${custom_fdt_name}"
          awk -F: -v board="${{ inputs.armbian_board }}" '
            {
              board_field = $14
              gsub(/^[[:space:]]+|[[:space:]]+$/, "", board_field)
            }
            board_field == board { print NR ":" $0 }
          ' "${model_conf}" || true

          # Preseed the exact kernel bundle locally so ophub ./rebuild does not
          # fetch a stale mutable release asset behind our back. Require the
          # immutable asset names published by compile-kernel.yml.
          mkdir -p "rebuild/build-armbian/kernel/${{ inputs.kernel_usage }}"
          release_api="https://api.github.com/repos/${{ inputs.kernel_repo }}/releases/tags/kernel_${{ inputs.kernel_usage }}"
          requested_kernel="${{ inputs.armbian_kernel }}"
          if printf '%s' "${requested_kernel}" | grep -Eq '^[0-9]+\.[0-9]+\.y$'; then
            kernel_prefix="${requested_kernel%.y}"
            immutable_regex="^${kernel_prefix//./\\.}\\.[0-9]+-${{ inputs.kernel_sign }}-g[0-9a-f]{8}-r[0-9]+\\.tar\\.gz$"
          else
            kernel_pattern="${requested_kernel//./\\.}"
            immutable_regex="^${kernel_pattern}-${{ inputs.kernel_sign }}-g[0-9a-f]{8}-r[0-9]+\\.tar\\.gz$"
          fi
          asset_meta="$(
            curl -fsSL --retry 5 --retry-delay 5 \
              -H "Accept: application/vnd.github+json" \
              -H "Authorization: Bearer ${{ secrets.GITHUB_TOKEN }}" \
              "${release_api}" |
              jq -r --arg re "${immutable_regex}" '
                .assets
                | map(select(.name | test($re)))
                | sort_by(.updated_at)
                | last
                | if . then (.name + "\t" + .url) else empty end
              '
          )"

          if [ -n "${asset_meta}" ]; then
            kernel_asset_name="$(printf '%s' "${asset_meta}" | cut -f1)"
            kernel_asset_url="$(printf '%s' "${asset_meta}" | cut -f2)"
            rebuild_kernel="$(printf '%s' "${kernel_asset_name}" | sed -E 's/^([0-9]+\.[0-9]+\.[0-9]+)-.*/\1/')"
            test -n "${rebuild_kernel}"
            kernel_cache_dir="rebuild/build-armbian/kernel/${{ inputs.kernel_usage }}/${rebuild_kernel}"
            rm -rf "${kernel_cache_dir}"
            echo "Prefetching immutable kernel bundle: ${kernel_asset_name}"
            echo "Using resolved exact prefetched kernel=${rebuild_kernel}"
            curl -fL --retry 5 --retry-delay 5 \
              -H "Accept: application/octet-stream" \
              -H "Authorization: Bearer ${{ secrets.GITHUB_TOKEN }}" \
              -o "${kernel_cache_dir}.tar.gz" \
              "${kernel_asset_url}"
          else
            echo "error: immutable kernel bundle not found for ${immutable_regex}"
            echo "Recent ${{ inputs.kernel_sign }} assets in kernel_${{ inputs.kernel_usage }}:"
            curl -fsSL --retry 5 --retry-delay 5 \
              -H "Accept: application/vnd.github+json" \
              -H "Authorization: Bearer ${{ secrets.GITHUB_TOKEN }}" \
              "${release_api}" |
              jq -r --arg sign "${{ inputs.kernel_sign }}" '
                .assets
                | map(select(.name | test("^[0-9]+\\.[0-9]+\\.[0-9]+-" + $sign + "-g[0-9a-f]{8}-r[0-9]+\\.tar\\.gz$")))
                | sort_by(.updated_at)
                | reverse
                | .[0:20]
                | .[]
                | "  " + .name + "  updated_at=" + .updated_at
              '
            echo "Run the kernel workflow first for the matching series, for example kernel_version=6.12.y kernel_auto=true kernel_sign=-${{ inputs.kernel_sign }}, then rerun this image workflow with armbian_kernel=6.12.y or the exact version shown in kernel_stable."
            exit 1
          fi
          tar -xzf "${kernel_cache_dir}.tar.gz" -C "rebuild/build-armbian/kernel/${{ inputs.kernel_usage }}"
          test -d "${kernel_cache_dir}"
          test -f "${kernel_cache_dir}/sha256sums"

          kernel_boot="$(find "${kernel_cache_dir}" -maxdepth 1 -type f -name 'boot-*.tar.gz' | head -n 1)"
          test -n "${kernel_boot}"
          case "${{ inputs.kernel_sign }}" in
            lb2002can)
              kernel_member="$(tar -tf "${kernel_boot}" | grep -E '(^|/|\.\/)vmlinuz-.*lb2002can$' | head -n 1)"
              test -n "${kernel_member}"
              tmp_kernel="/tmp/lb2002-kernel-check.bin"
              rm -f "${tmp_kernel}"
              tar -xOf "${kernel_boot}" "${kernel_member}" > "${tmp_kernel}"
              test -s "${tmp_kernel}"
              if ! strings "${tmp_kernel}" | grep -q 'lb2002-expk'; then
                echo "error: prefetched kernel bundle lacks lb2002-expk markers for requested kernel=${{ inputs.armbian_kernel }} sign=${{ inputs.kernel_sign }}"
                exit 1
              fi
              ;;
            cm311hmi)
              kernel_member="$(tar -tf "${kernel_boot}" | grep -E '(^|/|\.\/)vmlinuz-.*cm311hmi$' | head -n 1)"
              test -n "${kernel_member}"
              test -f "${kernel_cache_dir}/manifest.json"
              jq -e '.kernel_profile == "cm311" and .kernel_sign == "cm311hmi" and .cm311_dtb == "meson-g12a-s905l3a-e900v22c.dtb"' "${kernel_cache_dir}/manifest.json"
              cm311_dtb_archive="$(find "${kernel_cache_dir}" -maxdepth 1 -type f -name 'dtb-amlogic-*.tar.gz' | head -n 1)"
              test -n "${cm311_dtb_archive}"
              tar -tf "${cm311_dtb_archive}" | grep -E '(^|/|\.\/)((dtb/)?amlogic/)?meson-g12a-s905l3a-e900v22c\.dtb$'
              ;;
            *)
              kernel_member="$(tar -tf "${kernel_boot}" | grep -E '(^|/|\.\/)vmlinuz-' | head -n 1)"
              test -n "${kernel_member}"
              ;;
          esac

          # Any non-boot overlay content remains common rootfs content.
          while IFS= read -r item; do
            cp -avf --no-preserve=ownership "${item}" "${target_common}/"
          done < <(find "${custom_files}" -mindepth 1 -maxdepth 1 ! -name boot)

          chmod 755 "${target_common}/usr/local/sbin/cm311-set-hdmi-bpc8" 2>/dev/null || true
          chmod 755 "${target_common}/usr/local/sbin/cm311-select-hdmi-edid" 2>/dev/null || true
          chmod 755 "${target_common}/usr/local/sbin/cm311-select-hdmi-vtotal" 2>/dev/null || true
          chmod 755 "${target_common}/etc/initramfs-tools/hooks/cm311-edid" 2>/dev/null || true

          cd rebuild
          sudo ./rebuild \
            -b "${{ inputs.armbian_board }}" \
            -r "${{ inputs.kernel_repo }}" \
            -u "${{ inputs.kernel_usage }}" \
            -k "${rebuild_kernel}" \
            -a "false" \
            -t "${{ inputs.armbian_fstype }}" \
            -n "${{ inputs.builder_name }}"

          echo "PACKAGED_OUTPUTPATH=/builder/rebuild/build/output/images" >> ${GITHUB_ENV}
          echo "PACKAGED_STATUS=success" >> ${GITHUB_ENV}

      - name: Embed CM311 EDID into rebuilt initramfs
        id: cm311_initramfs
        if: ${{ steps.rebuild.outcome == 'success' && inputs.kernel_sign == 'cm311hmi' && !cancelled() }}
        run: |
          set -euo pipefail
          src="${PACKAGED_OUTPUTPATH}"
          cm311_final_edid="cm311_1280x720_v723_728_756_nhsync_nvsync.bin"
          mapfile -t artifacts < <(find "${src}" -maxdepth 1 -type f \( -name 'Armbian_*.img' -o -name 'Armbian_*.img.gz' \) ! -name 'Armbian-unofficial_*' | sort)
          test "${#artifacts[@]}" -gt 0

          patch_image() {
            local artifact="$1"
            local img_path="${artifact}"
            local recompress="false"
            if [[ "${artifact}" == *.img.gz ]]; then
              gzip -df "${artifact}"
              img_path="${artifact%.gz}"
              recompress="true"
            fi
            test -f "${img_path}"

            local work_dir boot_mnt root_mnt loopdev
            work_dir="$(mktemp -d)"
            boot_mnt="${work_dir}/boot"
            root_mnt="${work_dir}/root"
            mkdir -p "${boot_mnt}" "${root_mnt}"
            loopdev=""

            cleanup_mounts() {
              set +e
              mountpoint -q "${root_mnt}" && sudo umount "${root_mnt}"
              mountpoint -q "${boot_mnt}" && sudo umount "${boot_mnt}"
              if [ -n "${loopdev}" ]; then
                sudo losetup -d "${loopdev}"
              fi
              rm -rf "${work_dir}"
            }
            trap cleanup_mounts RETURN

            loopdev="$(sudo losetup -P -f --show "${img_path}")"
            sudo partprobe "${loopdev}" || true
            sudo mount "${loopdev}p1" "${boot_mnt}"
            sudo mount "${loopdev}p2" "${root_mnt}"

            local initrd_path kernel_name extract_dir new_initrd
            initrd_path="$(find "${boot_mnt}" -maxdepth 1 -type f -name 'initrd.img-*cm311hmi' | sort -V | tail -n 1)"
            test -n "${initrd_path}"
            kernel_name="$(basename "${initrd_path}" | sed 's/^initrd.img-//')"
            test -n "${kernel_name}"
            gzip -t "${initrd_path}"

            local edid_files=()
            local edid_dir edid_file
            for edid_dir in "${root_mnt}/usr/lib/firmware/edid" "${root_mnt}/lib/firmware/edid"; do
              if [ -d "${edid_dir}" ]; then
                for edid_file in "${edid_dir}"/cm311_1280x720*.bin; do
                  [ -f "${edid_file}" ] && edid_files+=("${edid_file}")
                done
              fi
            done
            test "${#edid_files[@]}" -gt 0

            extract_dir="${work_dir}/initrd"
            mkdir -p "${extract_dir}"
            gzip -dc "${initrd_path}" | (cd "${extract_dir}" && sudo cpio -id --quiet)
            sudo mkdir -p "${extract_dir}/usr/lib/firmware/edid"
            sudo cp -avf "${edid_files[@]}" "${extract_dir}/usr/lib/firmware/edid/"
            test -f "${extract_dir}/usr/lib/firmware/edid/${cm311_final_edid}"

            new_initrd="${work_dir}/initrd.img-${kernel_name}"
            (cd "${extract_dir}" && sudo find . -print0 | sudo cpio --null -o -H newc --quiet | gzip -9 > "${new_initrd}")
            gzip -t "${new_initrd}"
            sudo install -m 0644 "${new_initrd}" "${initrd_path}"
            gzip -dc "${initrd_path}" | cpio -t --quiet | grep -F "usr/lib/firmware/edid/${cm311_final_edid}"

            sudo mkimage -A arm64 -O linux -T ramdisk -C gzip -n "uInitrd-${kernel_name}" -d "${initrd_path}" "${boot_mnt}/uInitrd-${kernel_name}.new"
            sudo mv -f "${boot_mnt}/uInitrd-${kernel_name}.new" "${boot_mnt}/uInitrd-${kernel_name}"
            sudo cp -f "${boot_mnt}/uInitrd-${kernel_name}" "${boot_mnt}/uInitrd"
            sync

            trap - RETURN
            cleanup_mounts

            if [ "${recompress}" = "true" ]; then
              pigz -f "${img_path}"
            fi
          }

          for artifact in "${artifacts[@]}"; do
            echo "Embedding CM311 EDID into initramfs for ${artifact}"
            patch_image "${artifact}"
          done

      - name: Stage final rebuilt image only
        id: stage_artifacts
        if: ${{ steps.rebuild.outcome == 'success' && !cancelled() }}
        run: |
          set -e
          src="${PACKAGED_OUTPUTPATH}"
          dst="/builder/final-artifacts"
          rm -rf "${dst}"
          mkdir -p "${dst}"

          # Keep only the rebuilt public image artifacts, never the injected base image.
          find "${src}" -maxdepth 1 -type f -name 'Armbian_*.img.gz' ! -name 'Armbian-unofficial_*' -exec cp -f {} "${dst}/" \;

          if [ "$(find "${dst}" -maxdepth 1 -type f | wc -l)" -eq 0 ]; then
            echo "No rebuilt .img.gz found; trying rebuilt .img artifacts."
            find "${src}" -maxdepth 1 -type f -name 'Armbian_*.img' ! -name 'Armbian-unofficial_*' -exec cp -f {} "${dst}/" \;
          fi

          echo "Staged artifacts:"
          find "${dst}" -maxdepth 1 -type f | sort
          test "$(find "${dst}" -maxdepth 1 -type f | wc -l)" -gt 0

          echo "FINAL_ARTIFACT_PATH=${dst}" >> ${GITHUB_ENV}

      - name: Upload rebuilt images artifacts
        uses: actions/upload-artifact@v4
        if: ${{ steps.stage_artifacts.outcome == 'success' && !cancelled() }}
        with:
          name: armbian-${{ inputs.builder_name }}-image-${{ inputs.armbian_board }}-${{ inputs.armbian_kernel }}-${{ inputs.kernel_sign }}
          path: ${{ env.FINAL_ARTIFACT_PATH }}/*
          if-no-files-found: error
