#==========================================================================
# Description: Rebuild LB2002 Armbian image from a ready base image
#==========================================================================

name: Build Armbian server image

permissions:
  contents: read

on:
  repository_dispatch:
  workflow_dispatch:
    inputs:
      base_image_url:
        description: "Direct URL to base Armbian .img.gz"
        required: false
        default: "https://github.com/ophub/amlogic-s9xxx-armbian/releases/download/Armbian_bookworm_arm64_server_2026.05/Armbian_26.05.0_amlogic_s905l3a_bookworm_6.12.85_server_2026.05.01.img.gz"
      armbian_board:
        description: "Select device board."
        required: false
        default: "s905l3a"
        type: choice
        options:
          - s905l3a
      armbian_kernel:
        description: "Select kernel version."
        required: false
        default: "6.12.85"
        type: choice
        options:
          - 6.12.85
          - 6.12.y
          - 6.18.y
          - 6.12.y_6.18.y
      kernel_repo:
        description: "Set the kernel repository."
        required: false
        default: "ejvo/amlogic-s9xxx-armbian_lb2002"
        type: choice
        options:
          - ophub/kernel
          - ejvo/amlogic-s9xxx-armbian_lb2002
      kernel_usage:
        description: "Set the tags of the stable kernel."
        required: false
        default: "stable"
        type: choice
        options:
          - stable
          - flippy
          - beta
      armbian_fstype:
        description: "Select armbian rootfs type."
        required: false
        default: "ext4"
        type: choice
        options:
          - ext4
          - btrfs
      builder_name:
        description: "Set Armbian builder signature."
        required: false
        default: "lb2002"
        type: choice
        options:
          - ophub
          - angel
          - lb2002
      armbian_files:
        description: "Set the path of custom Armbian files."
        required: false
        default: "lb2002_dtb_research/armbian_files_lb2002_v2"

env:
  TZ: Etc/UTC

jobs:
  build:
    runs-on: ubuntu-24.04
    if: ${{ github.event.repository.owner.id == github.event.sender.id }}

    steps:
      - name: Checkout
        uses: actions/checkout@v6

      - name: Preflight
        id: preflight
        run: |
          set -e
          custom_root="${{ github.workspace }}/${{ inputs.armbian_files }}"
          test -d "${custom_root}"
          test -f "${custom_root}/boot/uEnv.txt"
          test -f "${custom_root}/boot/dtb/amlogic/meson-g12a-s905l3a-lb2002-test-v2.dtb"

          case "${{ inputs.armbian_board }}" in
            s905l3a) ;;
            *)
              echo "error: unsupported armbian_board: ${{ inputs.armbian_board }}"
              exit 1
              ;;
          esac

          kernel_url="https://github.com/${{ inputs.kernel_repo }}/releases/download/kernel_${{ inputs.kernel_usage }}/${{ inputs.armbian_kernel }}.tar.gz"
          echo "Checking kernel URL: ${kernel_url}"
          curl -fsI -o /dev/null "${kernel_url}"

          echo "Checking base image URL: ${{ inputs.base_image_url }}"
          curl -fsI -o /dev/null "${{ inputs.base_image_url }}"

          echo "status=success" >> ${GITHUB_OUTPUT}

      - name: Initialize the build environment
        id: init
        if: ${{ steps.preflight.outputs.status == 'success' && !cancelled() }}
        env:
          DEBIAN_FRONTEND: noninteractive
        run: |
          set -e
          sudo -E apt-get -y update
          sudo -E apt-get -y install curl wget xz-utils pigz p7zip-full
          echo "status=success" >> ${GITHUB_OUTPUT}

      - name: Create virtual disk for extended storage
        id: disk
        if: ${{ steps.init.outputs.status == 'success' && !cancelled() }}
        run: |
          set -e
          mnt_size=$(expr $(df -h /mnt | tail -1 | awk '{print $4}' | sed 's/[[:alpha:]]//g' | sed 's/\..*//') - 1)
          root_size=$(expr $(df -h / | tail -1 | awk '{print $4}' | sed 's/[[:alpha:]]//g' | sed 's/\..*//') - 4)
          sudo truncate -s "${mnt_size}"G /mnt/mnt.img
          sudo truncate -s "${root_size}"G /root.img
          sudo losetup /dev/loop6 /mnt/mnt.img
          sudo losetup /dev/loop7 /root.img
          sudo pvcreate /dev/loop6
          sudo pvcreate /dev/loop7
          sudo vgcreate github /dev/loop6 /dev/loop7
          sudo lvcreate -n runner -l 100%FREE github
          sudo mkfs.xfs -f -i sparse=0 -b size=4096 /dev/github/runner
          sudo mkdir -p /builder
          sudo mount /dev/github/runner /builder
          sudo chown -R runner:runner /builder
          df -Th
          echo "status=success" >> ${GITHUB_OUTPUT}

      - name: Download base image
        id: base
        if: ${{ steps.disk.outputs.status == 'success' && !cancelled() }}
        run: |
          set -e
          mkdir -p /builder/base
          cd /builder/base
          wget -O base.img.gz "${{ inputs.base_image_url }}"
          gzip -df base.img.gz
          mv base.img Armbian-unofficial_26.05.0-trunk_amlogic_s905l3a_bookworm_6.12.85.img
          ls -lh
          echo "status=success" >> ${GITHUB_OUTPUT}

      - name: Rebuild Armbian for target boards
        id: rebuild
        if: ${{ steps.base.outputs.status == 'success' && !cancelled() }}
        run: |
          set -e
          cd /builder
          rm -rf rebuild
          git clone -q --single-branch --depth=1 --branch=main https://github.com/ophub/amlogic-s9xxx-armbian.git rebuild

          mkdir -p rebuild/build/output/images
          cp -f /builder/base/*.img rebuild/build/output/images/

          custom_files="${{ github.workspace }}/${{ inputs.armbian_files }}"
          target_common="rebuild/build-armbian/armbian-files/common-files"
          target_bootfs="rebuild/build-armbian/armbian-files/different-files/${{ inputs.armbian_board }}/bootfs"
          mkdir -p "${target_common}" "${target_bootfs}"

          # Files under boot/ must land on the FAT boot partition for U-Boot.
          if [ -d "${custom_files}/boot" ]; then
            cp -avf --no-preserve=ownership "${custom_files}/boot/." "${target_bootfs}/"
          fi

          # Any non-boot overlay content remains common rootfs content.
          while IFS= read -r item; do
            cp -avf --no-preserve=ownership "${item}" "${target_common}/"
          done < <(find "${custom_files}" -mindepth 1 -maxdepth 1 ! -name boot)

          cd rebuild
          sudo ./rebuild \
            -b "${{ inputs.armbian_board }}" \
            -r "${{ inputs.kernel_repo }}" \
            -u "${{ inputs.kernel_usage }}" \
            -k "${{ inputs.armbian_kernel }}" \
            -a "false" \
            -t "${{ inputs.armbian_fstype }}" \
            -n "${{ inputs.builder_name }}"

          echo "PACKAGED_OUTPUTPATH=/builder/rebuild/build/output/images" >> ${GITHUB_ENV}
          echo "PACKAGED_STATUS=success" >> ${GITHUB_ENV}

      - name: Upload rebuilt images artifacts
        uses: actions/upload-artifact@v4
        if: ${{ steps.rebuild.outcome == 'success' && !cancelled() }}
        with:
          name: armbian-lb2002-image-${{ inputs.armbian_board }}-${{ inputs.armbian_kernel }}
          path: ${{ env.PACKAGED_OUTPUTPATH }}/*
          if-no-files-found: error
