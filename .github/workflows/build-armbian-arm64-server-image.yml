name: Build Armbian arm64 server image

permissions:
  contents: read

on:
  repository_dispatch:
  workflow_dispatch:
    inputs:
      set_release:
        description: "Select OS Release."
        required: false
        default: "bookworm"
        type: choice
        options:
          - trixie
          - bookworm
          - resolute
          - noble
      armbian_board:
        description: "Select device board."
        required: false
        default: "s905l3a"
        type: choice
        options:
          - s905l3a
      armbian_kernel:
        description: "Select kernel version."
        required: false
        default: "6.12.y"
        type: choice
        options:
          - 6.12.y
          - 6.18.y
          - 6.12.y_6.18.y
      kernel_repo:
        description: "Set the kernel repository."
        required: false
        default: "ejvo/amlogic-s9xxx-armbian_lb2002"
        type: choice
        options:
          - ophub/kernel
          - ejvo/amlogic-s9xxx-armbian_lb2002
      kernel_usage:
        description: "Set the tags of the stable kernel."
        required: false
        default: "stable"
        type: choice
        options:
          - stable
          - flippy
          - beta
      armbian_fstype:
        description: "Select armbian rootfs type."
        required: false
        default: "ext4"
        type: choice
        options:
          - ext4
          - btrfs
      armbian_edition:
        description: "Select image edition type."
        required: false
        default: "server"
        type: choice
        options:
          - server
          - desktop
          - beta
      builder_name:
        description: "Set Armbian builder signature."
        required: false
        default: "lb2002"
        type: choice
        options:
          - ophub
          - angel
          - lb2002
      armbian_files:
        description: "Set the path of custom Armbian files."
        required: false
        default: "lb2002_dtb_research/armbian_files_lb2002_v2"
      config_board:
        description: "Set the base Armbian board name."
        required: false
        default: "odroidn2"

env:
  TZ: Etc/UTC
  ROOTFS_SCRIPT: compile-kernel/tools/script/docker/build_armbian_rootfs_file.sh

jobs:
  build:
    runs-on: ubuntu-24.04
    if: ${{ github.event.repository.owner.id == github.event.sender.id }}

    steps:
      - name: Checkout
        uses: actions/checkout@v6

      - name: Initialize the build environment
        id: init
        env:
          DEBIAN_FRONTEND: noninteractive
        run: |
          docker rmi -f $(docker images -q) 2>/dev/null || true
          [[ -n "${AGENT_TOOLSDIRECTORY}" ]] && sudo rm -rf "${AGENT_TOOLSDIRECTORY}"
          sudo rm -rf /usr/share/dotnet /usr/local/lib/android 2>/dev/null
          sudo swapoff -a
          sudo rm -f /swapfile /mnt/swapfile
          sudo -E apt-get -y update
          sudo -E apt-get -y purge azure-cli ghc* zulu* llvm* firefox google* dotnet* powershell openjdk* mongodb* moby* || true
          sudo -E apt-get -y install $(curl -fsSL https://ophub.org/ubuntu2404-build-armbian-depends)
          sudo -E systemctl daemon-reload
          sudo -E apt-get -y autoremove --purge
          sudo -E apt-get clean
          sudo sed -i '/NVM_DIR/d;/skel/d' /root/{.bashrc,.profile}
          sudo rm -rf ~/{.cargo,.dotnet,.rustup}
          sudo -E timedatectl set-timezone "${TZ:-Etc/UTC}"
          sudo -E ntpdate ntp.ubuntu.com 0.pool.ntp.org || true
          sudo -E timedatectl set-ntp true
          date -u
          timedatectl status || true
          echo "status=success" >> ${GITHUB_OUTPUT}

      - name: Create virtual disk for extended storage
        id: disk
        run: |
          mnt_size=$(expr $(df -h /mnt | tail -1 | awk '{print $4}' | sed 's/[[:alpha:]]//g' | sed 's/\..*//') - 1)
          root_size=$(expr $(df -h / | tail -1 | awk '{print $4}' | sed 's/[[:alpha:]]//g' | sed 's/\..*//') - 4)
          sudo truncate -s "${mnt_size}"G /mnt/mnt.img
          sudo truncate -s "${root_size}"G /root.img
          sudo losetup /dev/loop6 /mnt/mnt.img
          sudo losetup /dev/loop7 /root.img
          sudo pvcreate /dev/loop6
          sudo pvcreate /dev/loop7
          sudo vgcreate github /dev/loop6 /dev/loop7
          sudo lvcreate -n runner -l 100%FREE github
          sudo mkfs.xfs -f -i sparse=0 -b size=4096 /dev/github/runner
          sudo mkdir -p /builder
          sudo mount /dev/github/runner /builder
          sudo chown -R runner:runner /builder
          df -Th
          echo "status=success" >> ${GITHUB_OUTPUT}

      - name: Download Armbian source code
        id: down
        working-directory: /builder
        if: ${{ steps.init.outputs.status == 'success' && !cancelled() }}
        run: |
          df -hT ${PWD}
          git clone -q --single-branch --depth=1 --branch=main https://github.com/armbian/build.git build
          ln -sf /builder/build ${{ github.workspace }}/build
          echo "status=success" >> ${GITHUB_OUTPUT}

      - name: Compile Armbian [ ${{ inputs.set_release }} ]
        id: compile
        working-directory: /builder
        if: ${{ steps.down.outputs.status == 'success' && !cancelled() }}
        run: |
          docker run --rm --privileged multiarch/qemu-user-static --reset -p yes 2>/dev/null || true
          config_board="${{ inputs.config_board }}"
          [[ -z "${config_board}" ]] && config_board="odroidn2"
          cd build/
          ./compile.sh RELEASE=${{ inputs.set_release }} BOARD=${config_board} BRANCH=current BUILD_MINIMAL=no \
                       BUILD_ONLY=default HOST=armbian BUILD_DESKTOP=no EXPERT=yes KERNEL_CONFIGURE=no \
                       COMPRESS_OUTPUTIMAGE="sha" SHARE_LOG=yes
          echo "status=success" >> ${GITHUB_OUTPUT}

      - name: Organize output files and reclaim disk space
        id: clean
        if: ${{ steps.compile.outputs.status == 'success' && !cancelled() }}
        run: |
          chmod +x ${ROOTFS_SCRIPT}
          ${ROOTFS_SCRIPT} -v ${{ inputs.set_release }} -s true -c true -k true -p arm64
          cd build/
          rm -rf $(ls . | grep -v "^output$" | xargs) 2>/dev/null
          df -hT ${PWD}
          echo "build_tag=Armbian_${{ inputs.set_release }}_arm64_${{ inputs.armbian_edition }}_$(date +"%Y.%m")" >> ${GITHUB_ENV}
          echo "status=success" >> ${GITHUB_OUTPUT}

      - name: Upload Armbian base image artifacts
        uses: actions/upload-artifact@v4
        if: ${{ steps.clean.outputs.status == 'success' && !cancelled() }}
        with:
          name: armbian-base-image-${{ inputs.set_release }}-${{ inputs.armbian_edition }}
          path: build/output/images/*
          if-no-files-found: error

      - name: Rebuild Armbian for target boards
        id: rebuild
        if: ${{ steps.clean.outputs.status == 'success' && !cancelled() }}
        run: |
          set -e
          df -hT /builder
          cd /builder
          rm -rf rebuild
          git clone -q --single-branch --depth=1 --branch=main https://github.com/ophub/amlogic-s9xxx-armbian.git rebuild

          mkdir -p rebuild/build/output/images
          cp -f build/output/images/*.img.gz rebuild/build/output/images/

          custom_files="${{ github.workspace }}/${{ inputs.armbian_files }}"
          target_common="rebuild/build-armbian/armbian-files/common-files"
          mkdir -p "${target_common}"
          if [ -d "${custom_files}" ]; then
            cp -avf --no-preserve=ownership "${custom_files}/." "${target_common}/"
          else
            echo "error: custom Armbian files path not found: ${custom_files}"
            exit 1
          fi

          cd rebuild
          sudo ./rebuild \
            -b "${{ inputs.armbian_board }}" \
            -r "${{ inputs.kernel_repo }}" \
            -u "${{ inputs.kernel_usage }}" \
            -k "${{ inputs.armbian_kernel }}" \
            -a "true" \
            -t "${{ inputs.armbian_fstype }}" \
            -n "${{ inputs.builder_name }}"

          echo "PACKAGED_OUTPUTPATH=/builder/rebuild/build/output/images" >> ${GITHUB_ENV}
          echo "PACKAGED_STATUS=success" >> ${GITHUB_ENV}
          df -hT /builder

      - name: Upload rebuilt images artifacts
        uses: actions/upload-artifact@v4
        if: ${{ steps.rebuild.outcome == 'success' && !cancelled() }}
        with:
          name: armbian-lb2002-image-${{ inputs.set_release }}-${{ inputs.armbian_edition }}-${{ inputs.armbian_board }}
          path: ${{ env.PACKAGED_OUTPUTPATH }}/*
          if-no-files-found: error
