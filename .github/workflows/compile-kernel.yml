# Copyright (C) 2021 https://github.com/ophub/amlogic-s9xxx-armbian
#==========================================================================

name: Compile the kernel

permissions:
  contents: write

on:
  repository_dispatch:
  workflow_dispatch:
    inputs:
      kernel_source:
        description: "Select the kernel source"
        required: false
        default: "unifreq"
        type: choice
        options:
          - unifreq
          - ophub
      kernel_version:
        description: "Select kernel version"
        required: false
        default: "6.12.y"
        type: choice
        options:
          - 5.10.y
          - 5.15.y
          - 6.1.y
          - 6.6.y
          - 6.12.y
          - 6.18.y
      kernel_auto:
        description: "Auto use the latest kernel"
        required: false
        default: true
        type: boolean
      delete_source:
        description: "Delete source after compilation"
        required: false
        default: true
        type: boolean
      kernel_package:
        description: "Select compile package list"
        required: false
        default: "all"
        type: choice
        options:
          - all
          - dtbs
      kernel_toolchain:
        description: "Select the compilation toolchain"
        required: false
        default: "gcc"
        type: choice
        options:
          - clang
          - gcc
          - gcc-15.2
          - gcc-14.3
          - gcc-14.2
      ccache_clear:
        description: "Set whether to clear the cache"
        required: false
        default: false
        type: boolean
      docker_image:
        description: "Select Armbian docker image"
        required: false
        default: "resolute"
        type: choice
        options:
          - trixie
          - bookworm
          - resolute
          - noble
      kernel_sign:
        description: "Set the kernel custom signature"
        required: false
        default: "-cm311hmi"
        type: choice
        options:
          - -lb2002can
          - -cm311hmi
          - -ophub

env:
  TZ: Etc/UTC

jobs:
  build:
    runs-on: ubuntu-24.04-arm
    if: ${{ github.event.repository.owner.id == github.event.sender.id }}

    steps:
      - name: Checkout
        uses: actions/checkout@v6

      - name: Initialize the build environment
        id: init
        env:
          DEBIAN_FRONTEND: noninteractive
        run: |
          docker rmi -f $(docker images -q) 2>/dev/null || true
          [[ -n "${AGENT_TOOLSDIRECTORY}" ]] && sudo rm -rf "${AGENT_TOOLSDIRECTORY}"
          sudo rm -rf /usr/share/dotnet /usr/local/lib/android 2>/dev/null
          sudo swapoff -a
          sudo rm -f /swapfile /mnt/swapfile
          sudo -E apt-get -y update
          sudo -E apt-get -y purge azure-cli ghc* zulu* llvm* firefox google* dotnet* powershell openjdk* mongodb* moby* || true
          sudo -E apt-get -y install $(curl -fsSL https://ophub.org/ubuntu2404-build-armbian-depends)
          sudo -E systemctl daemon-reload
          sudo -E apt-get -y autoremove --purge
          sudo -E apt-get clean
          sudo sed -i '/NVM_DIR/d;/skel/d' /root/{.bashrc,.profile}
          sudo rm -rf ~/{.cargo,.dotnet,.rustup}
          sudo -E timedatectl set-timezone "${TZ:-Etc/UTC}"
          sudo -E ntpdate ntp.ubuntu.com 0.pool.ntp.org || true
          sudo -E timedatectl set-ntp true
          date -u
          timedatectl status || true
          echo "status=success" >> ${GITHUB_OUTPUT}

      - name: Create virtual disk for extended storage
        id: disk
        run: |
          mnt_size=$(expr $(df -h /mnt | tail -1 | awk '{print $4}' | sed 's/[[:alpha:]]//g' | sed 's/\..*//') - 1)
          root_size=$(expr $(df -h / | tail -1 | awk '{print $4}' | sed 's/[[:alpha:]]//g' | sed 's/\..*//') - 4)
          sudo truncate -s "${mnt_size}"G /mnt/mnt.img
          sudo truncate -s "${root_size}"G /root.img
          sudo losetup /dev/loop6 /mnt/mnt.img
          sudo losetup /dev/loop7 /root.img
          sudo pvcreate /dev/loop6
          sudo pvcreate /dev/loop7
          sudo vgcreate github /dev/loop6 /dev/loop7
          sudo lvcreate -n runner -l 100%FREE github
          sudo mkfs.xfs -f -i sparse=0 -b size=4096 /dev/github/runner
          sudo mkdir -p /builder
          sudo mount /dev/github/runner /builder
          sudo chown -R runner:runner /builder
          df -Th
          echo "status=success" >> ${GITHUB_OUTPUT}

      - name: Get kernel source commit hash
        id: kernelhash
        run: |
          api_url="https://api.github.com/repos/${{ inputs.kernel_source }}/linux-${{ inputs.kernel_version }}/git/ref/heads/main"
          source_hash=$(curl -fsSL -m 20 \
              -H "Accept: application/vnd.github+json" \
              -H "Authorization: Bearer ${{ secrets.GITHUB_TOKEN }}" \
              ${api_url} |
              jq -r '.object.sha'
          )
          [[ -z "${source_hash}" || "${source_hash}" == "null" ]] && source_hash="${{ github.sha }}"
          echo "source_hash=${source_hash}" >> ${GITHUB_ENV}
          echo "status=success" >> ${GITHUB_OUTPUT}

      - name: Cache ccache
        uses: actions/cache@v5
        with:
          path: /builder/ccache
          key: kernel-${{ inputs.kernel_toolchain }}-${{ inputs.kernel_version }}-${{ env.source_hash }}
          restore-keys: |
            kernel-${{ inputs.kernel_toolchain }}-${{ inputs.kernel_version }}-

      - name: Resolve kernel profile
        id: kernel_profile
        run: |
          set -e
          case "${{ inputs.kernel_sign }}" in
            -lb2002can)
              profile="lb2002"
              kernel_config="kernel/config_lb2002"
              kernel_patch="kernel/patch_lb2002_experiment_k"
              ;;
            -cm311hmi)
              profile="cm311"
              kernel_config="kernel/config_cm311"
              kernel_patch="kernel/patch_cm311_hmi"
              ;;
            *)
              profile="generic"
              kernel_config="kernel/config_lb2002"
              kernel_patch="kernel/patch_lb2002_experiment_k"
              ;;
          esac

          test -d "${kernel_config}"
          test -d "${kernel_patch}"
          echo "profile=${profile}" >> "${GITHUB_OUTPUT}"
          echo "kernel_config=${kernel_config}" >> "${GITHUB_OUTPUT}"
          echo "kernel_patch=${kernel_patch}" >> "${GITHUB_OUTPUT}"
          echo "Using kernel profile=${profile} config=${kernel_config} patch=${kernel_patch}"

      - name: Compile the kernel [ ${{ inputs.kernel_version }} ]
        id: compile_kernel
        uses: ophub/amlogic-s9xxx-armbian@main
        continue-on-error: true
        if: ${{ steps.disk.outputs.status == 'success' && !cancelled() }}
        with:
          build_target: kernel
          kernel_source: ${{ inputs.kernel_source }}
          kernel_version: ${{ inputs.kernel_version }}
          kernel_auto: ${{ inputs.kernel_auto }}
          delete_source: ${{ inputs.delete_source }}
          kernel_package: ${{ inputs.kernel_package }}
          kernel_sign: ${{ inputs.kernel_sign }}
          kernel_toolchain: ${{ inputs.kernel_toolchain }}
          kernel_config: ${{ steps.kernel_profile.outputs.kernel_config }}
          kernel_patch: ${{ steps.kernel_profile.outputs.kernel_patch }}
          auto_patch: true
          config_flavor: ""
          ccache_clear: ${{ inputs.ccache_clear }}
          docker_hostpath: /builder
          docker_image: ophub/armbian-${{ inputs.docker_image }}:arm64

      - name: Debug packaged files
        if: ${{ always() }}
        run: |
          echo "PACKAGED_STATUS=${PACKAGED_STATUS}"
          echo "PACKAGED_OUTPUTPATH=${PACKAGED_OUTPUTPATH}"
          ls -lah /builder/compile-kernel/output || true
          find /builder/compile-kernel/output -maxdepth 2 -type f | sort || true

      - name: Verify kernel output exists
        if: ${{ always() }}
        run: |
          test -d /builder/compile-kernel/output
          find /builder/compile-kernel/output -maxdepth 2 -type f | sort
          test "$(find /builder/compile-kernel/output -type f | wc -l)" -gt 0

      - name: Verify CAN config in packaged kernel
        if: ${{ always() && steps.kernel_profile.outputs.profile == 'lb2002' }}
        run: |
          set -e
          outdir="/builder/compile-kernel/output"
          main_tar="$(find "${outdir}" -maxdepth 1 -type f -name '*.tar.gz' ! -name 'deb-*' | head -n 1)"
          test -n "${main_tar}"
          boot_member="$(tar -tf "${main_tar}" | grep -E '(^|/|\.\/)boot-[0-9]+\.[0-9]+\.[0-9]+.*\.tar\.gz$' | head -n 1)"
          if [ -z "${boot_member}" ]; then
            echo "Could not locate boot-*.tar.gz inside ${main_tar}"
            tar -tf "${main_tar}" | sed -n '1,120p'
            exit 1
          fi
          tar -xOf "${main_tar}" "${boot_member}" > /tmp/boot-nested.tar.gz

          config_name="$(tar -tf /tmp/boot-nested.tar.gz | grep -E '(^|/|\.\/)config-[0-9]+\.[0-9]+\.[0-9]+' | head -n 1)"
          if [ -z "${config_name}" ]; then
            echo "Could not locate config-* inside nested ${boot_member}"
            tar -tf /tmp/boot-nested.tar.gz | sed -n '1,120p'
            exit 1
          fi
          tar -xOf /tmp/boot-nested.tar.gz "${config_name}" > /tmp/kernel-config-check
          test -s /tmp/kernel-config-check
          grep -E '^CONFIG_CAN_GS_USB=m$' /tmp/kernel-config-check
          grep -E '^CONFIG_CAN_SLCAN=m$' /tmp/kernel-config-check
          grep -E '^CONFIG_CAN_MCP251X=m$' /tmp/kernel-config-check
          grep -E '^CONFIG_CAN_MCP251XFD=m$' /tmp/kernel-config-check

      - name: Verify lb2002 experiment marker in packaged kernel
        id: verify_lb2002_marker
        if: ${{ always() && steps.kernel_profile.outputs.profile == 'lb2002' }}
        run: |
          set -e
          outdir="/builder/compile-kernel/output"
          main_tar="$(find "${outdir}" -maxdepth 1 -type f -name '*.tar.gz' ! -name 'deb-*' | head -n 1)"
          test -n "${main_tar}"
          boot_member="$(tar -tf "${main_tar}" | grep -E '(^|/|\.\/)boot-[0-9]+\.[0-9]+\.[0-9]+.*\.tar\.gz$' | head -n 1)"
          test -n "${boot_member}"
          tar -xOf "${main_tar}" "${boot_member}" > /tmp/boot-nested.tar.gz

          kernel_name="$(tar -tf /tmp/boot-nested.tar.gz | grep -E '(^|/|\.\/)vmlinuz-.*lb2002can$' | head -n 1)"
          if [ -z "${kernel_name}" ]; then
            echo "Could not locate vmlinuz-*lb2002can inside nested ${boot_member}"
            tar -tf /tmp/boot-nested.tar.gz | sed -n '1,120p'
            exit 1
          fi
          tar -xOf /tmp/boot-nested.tar.gz "${kernel_name}" > /tmp/kernel-vmlinuz-check
          test -s /tmp/kernel-vmlinuz-check
          grep -a 'lb2002-expk' /tmp/kernel-vmlinuz-check
          rm -f /tmp/kernel-vmlinuz-check /tmp/boot-nested.tar.gz

      - name: Verify CM311 HMI config and DTB in packaged kernel
        id: verify_cm311_profile
        if: ${{ always() && steps.kernel_profile.outputs.profile == 'cm311' }}
        run: |
          set -e
          outdir="/builder/compile-kernel/output"
          main_tar="$(find "${outdir}" -maxdepth 1 -type f -name '*.tar.gz' ! -name 'deb-*' | head -n 1)"
          test -n "${main_tar}"

          boot_member="$(tar -tf "${main_tar}" | grep -E '(^|/|\.\/)boot-[0-9]+\.[0-9]+\.[0-9]+.*\.tar\.gz$' | head -n 1)"
          if [ -z "${boot_member}" ]; then
            echo "Could not locate boot-*.tar.gz inside ${main_tar}"
            tar -tf "${main_tar}" | sed -n '1,120p'
            exit 1
          fi
          tar -xOf "${main_tar}" "${boot_member}" > /tmp/boot-nested.tar.gz

          config_name="$(tar -tf /tmp/boot-nested.tar.gz | grep -E '(^|/|\.\/)config-[0-9]+\.[0-9]+\.[0-9]+' | head -n 1)"
          if [ -z "${config_name}" ]; then
            echo "Could not locate config-* inside nested ${boot_member}"
            tar -tf /tmp/boot-nested.tar.gz | sed -n '1,120p'
            exit 1
          fi
          tar -xOf /tmp/boot-nested.tar.gz "${config_name}" > /tmp/kernel-config-check
          test -s /tmp/kernel-config-check
          grep -E '^CONFIG_RTC_DRV_DS1307=(m|y)$' /tmp/kernel-config-check
          grep -E '^CONFIG_SERIAL_MESON=y$' /tmp/kernel-config-check
          grep -E '^CONFIG_I2C_CHARDEV=y$' /tmp/kernel-config-check
          grep -E '^CONFIG_I2C_MESON=y$' /tmp/kernel-config-check
          grep -E '^CONFIG_PWM_MESON=y$' /tmp/kernel-config-check
          grep -E '^CONFIG_DRM_LOAD_EDID_FIRMWARE=y$' /tmp/kernel-config-check
          grep -E '^CONFIG_PSTORE=y$' /tmp/kernel-config-check
          grep -E '^CONFIG_PSTORE_RAM=y$' /tmp/kernel-config-check
          grep -E '^CONFIG_PSTORE_CONSOLE=y$' /tmp/kernel-config-check
          grep -E '^CONFIG_PSTORE_PMSG=y$' /tmp/kernel-config-check

          kernel_name="$(tar -tf /tmp/boot-nested.tar.gz | grep -E '(^|/|\.\/)vmlinuz-.*cm311hmi$' | head -n 1)"
          if [ -z "${kernel_name}" ]; then
            echo "Could not locate vmlinuz-*cm311hmi inside nested ${boot_member}"
            tar -tf /tmp/boot-nested.tar.gz | sed -n '1,160p'
            exit 1
          fi

          dtb_members="$(tar -tf "${main_tar}" | grep -E '(^|/|\.\/)dtb-[^/]*\.tar\.gz$' | sort || true)"
          if [ -z "${dtb_members}" ]; then
            echo "Could not locate dtb-*.tar.gz inside ${main_tar}"
            tar -tf "${main_tar}" | sed -n '1,160p'
            exit 1
          fi

          dtb_member=""
          dtb_name=""
          while IFS= read -r candidate_dtb_member; do
            test -n "${candidate_dtb_member}"
            tar -xOf "${main_tar}" "${candidate_dtb_member}" > /tmp/dtb-nested.tar.gz
            candidate_dtb_name="$(tar -tf /tmp/dtb-nested.tar.gz | grep -E '(^|/|\.\/)((dtb/)?amlogic/)?meson-g12a-s905l3a-e900v22c\.dtb$' | head -n 1 || true)"
            if [ -n "${candidate_dtb_name}" ]; then
              dtb_member="${candidate_dtb_member}"
              dtb_name="${candidate_dtb_name}"
              break
            fi
          done <<< "${dtb_members}"

          if [ -z "${dtb_name}" ]; then
            echo "Could not locate meson-g12a-s905l3a-e900v22c.dtb inside any dtb-*.tar.gz nested in ${main_tar}"
            echo "Available s905l3a DTBs:"
            while IFS= read -r candidate_dtb_member; do
              test -n "${candidate_dtb_member}"
              echo "  ${candidate_dtb_member}:"
              tar -xOf "${main_tar}" "${candidate_dtb_member}" > /tmp/dtb-nested.tar.gz
              tar -tf /tmp/dtb-nested.tar.gz | grep -E '(^|/)((dtb/)?amlogic/)?[^/]*s905l3a[^/]*\.dtb$' || true
            done <<< "${dtb_members}"
            exit 1
          fi
          echo "Using DTB ${dtb_name} from ${dtb_member}"
          tar -xOf /tmp/dtb-nested.tar.gz "${dtb_name}" > /tmp/cm311-e900v22c.dtb
          test -s /tmp/cm311-e900v22c.dtb
          if command -v dtc >/dev/null 2>&1; then
            dtc -I dtb -O dts -o /tmp/cm311-e900v22c.dts /tmp/cm311-e900v22c.dtb >/tmp/cm311-dtc.log 2>&1 || {
              cat /tmp/cm311-dtc.log
              exit 1
            }
            grep -E 'maxim,ds3231|ds3231' /tmp/cm311-e900v22c.dts
            grep -E 'uart_b|uart-b' /tmp/cm311-e900v22c.dts
            grep -E 'uart_ao_b|uart-ao-b' /tmp/cm311-e900v22c.dts
            grep -E 'pwm_c|pwm-c' /tmp/cm311-e900v22c.dts
            grep -E 'compatible = "ramoops"' /tmp/cm311-e900v22c.dts
            grep -E 'record-size = <(0x0+ )?0x0*40000>;' /tmp/cm311-e900v22c.dts
            grep -E 'console-size = <(0x0+ )?0x0*40000>;' /tmp/cm311-e900v22c.dts
          else
            strings /tmp/cm311-e900v22c.dtb | grep -E 'maxim,ds3231|ds3231'
            strings /tmp/cm311-e900v22c.dtb | grep -E 'uart_b|uart-b'
            strings /tmp/cm311-e900v22c.dtb | grep -E 'uart_ao_b|uart-ao-b'
            strings /tmp/cm311-e900v22c.dtb | grep -E 'pwm_c|pwm-c'
            strings /tmp/cm311-e900v22c.dtb | grep -E 'ramoops'
          fi

          if grep -q '^CONFIG_RTC_DRV_DS1307=m$' /tmp/kernel-config-check; then
            modules_member="$(tar -tf "${main_tar}" | grep -E '(^|/|\.\/)modules-[0-9]+\.[0-9]+\.[0-9]+.*\.tar\.gz$' | head -n 1)"
            if [ -z "${modules_member}" ]; then
              echo "Could not locate modules-*.tar.gz inside ${main_tar}"
              tar -tf "${main_tar}" | sed -n '1,120p'
              exit 1
            fi
            tar -xOf "${main_tar}" "${modules_member}" > /tmp/modules-nested.tar.gz
            tar -tf /tmp/modules-nested.tar.gz | grep -E 'rtc-ds1307\.ko'
          fi

          rm -f /tmp/boot-nested.tar.gz /tmp/dtb-nested.tar.gz /tmp/modules-nested.tar.gz /tmp/kernel-config-check /tmp/cm311-e900v22c.dtb /tmp/cm311-e900v22c.dts

      - name: Verify selected kernel profile completed
        id: verify_kernel_profile
        if: ${{ always() }}
        run: |
          set -e
          case "${{ steps.kernel_profile.outputs.profile }}" in
            lb2002)
              test "${{ steps.verify_lb2002_marker.outcome }}" = "success"
              ;;
            cm311)
              test "${{ steps.verify_cm311_profile.outcome }}" = "success"
              ;;
            generic)
              test -d /builder/compile-kernel/output
              test "$(find /builder/compile-kernel/output -type f | wc -l)" -gt 0
              ;;
            *)
              echo "error: unsupported kernel profile: ${{ steps.kernel_profile.outputs.profile }}"
              exit 1
              ;;
          esac
          echo "status=success" >> "${GITHUB_OUTPUT}"

      - name: Create exact-version kernel release aliases
        if: ${{ steps.verify_kernel_profile.outputs.status == 'success' && !cancelled() }}
        run: |
          set -e
          outdir="/builder/compile-kernel/output"
          workdir="/tmp/kernel-release-alias"
          rm -rf "${workdir}"
          mkdir -p "${workdir}/main" "${workdir}/deb" "${workdir}/packed"

          main_tar="$(find "${outdir}" -maxdepth 1 -type f -name '*.tar.gz' ! -name 'deb-*' | head -n 1)"
          deb_tar="$(find "${outdir}" -maxdepth 1 -type f -name 'deb-*.tar.gz' | head -n 1)"
          test -n "${main_tar}"
          test -n "${deb_tar}"

          tar -xzf "${main_tar}" -C "${workdir}/main"
          tar -xzf "${deb_tar}" -C "${workdir}/deb"

          main_root="$(find "${workdir}/main" -mindepth 1 -maxdepth 1 -type d | sort | head -n 1)"
          deb_root="$(find "${workdir}/deb" -mindepth 1 -maxdepth 1 -type d | sort | head -n 1)"
          if [ -z "${main_root}" ]; then
            main_root="${workdir}/main"
          fi
          if [ -z "${deb_root}" ]; then
            deb_root="${workdir}/deb"
          fi
          echo "Using extracted kernel roots: main=${main_root} deb=${deb_root}"

          boot_member="$(find "${main_root}" -maxdepth 1 -type f -name 'boot-*.tar.gz' | head -n 1)"
          test -n "${boot_member}"

          exact_version="$(basename "${boot_member}" | sed -E 's/^boot-([0-9]+\.[0-9]+\.[0-9]+).*/\1/')"
          test -n "${exact_version}"

          mkdir -p "${workdir}/packed/${exact_version}" "${workdir}/packed/deb-${exact_version}"
          cp -af "${main_root}/." "${workdir}/packed/${exact_version}/"
          cp -af "${deb_root}/." "${workdir}/packed/deb-${exact_version}/"

          sign_tag="$(printf '%s' "${{ inputs.kernel_sign }}" | sed -E 's#^-##; s#[^A-Za-z0-9._-]#-#g')"
          immutable_suffix="${sign_tag}-g${GITHUB_SHA::8}-r${GITHUB_RUN_ID}"
          requested_main_asset="${{ inputs.kernel_version }}-${immutable_suffix}.tar.gz"
          requested_deb_asset="deb-${{ inputs.kernel_version }}-${immutable_suffix}.tar.gz"
          exact_main_asset="${exact_version}-${immutable_suffix}.tar.gz"
          exact_deb_asset="deb-${exact_version}-${immutable_suffix}.tar.gz"

          cm311_overlays_json='[]'
          cm311_dtb=''
          if [ "${{ steps.kernel_profile.outputs.profile }}" = "cm311" ]; then
            cm311_overlays_json='["UART_EE_B","UART_AO_B","I2C_EE_M0_DS3231","PWM_C"]'
            cm311_dtb='meson-g12a-s905l3a-e900v22c.dtb'
          fi

          cat > "${workdir}/kernel-release-manifest.json" <<EOF
          {
            "requested_kernel": "${{ inputs.kernel_version }}",
            "exact_kernel_version": "${exact_version}",
            "kernel_sign": "${sign_tag}",
            "kernel_profile": "${{ steps.kernel_profile.outputs.profile }}",
            "kernel_config": "${{ steps.kernel_profile.outputs.kernel_config }}",
            "kernel_patch": "${{ steps.kernel_profile.outputs.kernel_patch }}",
            "cm311_overlays": ${cm311_overlays_json},
            "cm311_dtb": "${cm311_dtb}",
            "git_sha": "${GITHUB_SHA}",
            "run_id": "${GITHUB_RUN_ID}",
            "assets": {
              "requested": "${requested_main_asset}",
              "requested_deb": "${requested_deb_asset}",
              "exact": "${exact_main_asset}",
              "exact_deb": "${exact_deb_asset}"
            }
          }
          EOF
          sudo install -m 0644 "${workdir}/kernel-release-manifest.json" "${workdir}/packed/${exact_version}/manifest.json"
          (
            cd "${workdir}/packed"
            sudo tar -czf "${outdir}/${requested_main_asset}" "${exact_version}"
            sudo tar -czf "${outdir}/${exact_main_asset}" "${exact_version}"
            sudo tar -czf "${outdir}/${requested_deb_asset}" "deb-${exact_version}"
            sudo tar -czf "${outdir}/${exact_deb_asset}" "deb-${exact_version}"
          )
          sudo install -m 0644 "${workdir}/kernel-release-manifest.json" "${outdir}/kernel-release-manifest.json"

          echo "EXACT_KERNEL_VERSION=${exact_version}" >> ${GITHUB_ENV}
          echo "IMMUTABLE_REQUESTED_KERNEL_ASSET=${requested_main_asset}" >> ${GITHUB_ENV}
          echo "IMMUTABLE_EXACT_KERNEL_ASSET=${exact_main_asset}" >> ${GITHUB_ENV}
          test -f "${outdir}/${requested_main_asset}"
          test -f "${outdir}/${requested_deb_asset}"
          test -f "${outdir}/${exact_main_asset}"
          test -f "${outdir}/${exact_deb_asset}"
          echo "Immutable release assets created:"
          find "${outdir}" -maxdepth 1 -type f -name "*-${sign_tag}-g*-r*.tar.gz" -printf "  %f\n" | sort
          sudo ls -lh "${outdir}"

      - name: Upload final kernel artifacts
        uses: actions/upload-artifact@v4
        if: ${{ steps.verify_kernel_profile.outputs.status == 'success' && !cancelled() }}
        with:
          name: kernel-output-${{ inputs.kernel_version }}${{ inputs.kernel_sign }}
          path: /builder/compile-kernel/output/**
          if-no-files-found: error

      - name: Upload Kernel to Release
        uses: ncipollo/release-action@main
        if: ${{ steps.verify_kernel_profile.outputs.status == 'success' && !cancelled() }}
        with:
          tag: kernel_stable
          artifacts: /builder/compile-kernel/output/*
          allowUpdates: true
          removeArtifacts: true
          replacesArtifacts: true
          makeLatest: false
          token: ${{ secrets.GITHUB_TOKEN }}
          body: |
            - Mainline LTS kernels for Armbian rebuilds.
            - Includes LB2002 CAN-enabled builds when present.
