# CM311 HMI status LED policy.
# Current DTB names:
#   GPIOAO_10 / GPIO607 -> remote_led -> green
#   GPIOAO_11 / GPIO608 -> power_led -> red

GREEN_LED=remote_led
RED_LED=power_led

# Optional application service. Leave empty when the HMI service is installed
# under a different unit name; set it locally if needed.
HMI_SERVICE=

CHECK_INTERVAL_SEC=5
ROOTFS_WARN_PCT=85
ROOTFS_CRIT_PCT=95
TEMP_WARN_MILLIC=70000
TEMP_CRIT_MILLIC=80000
LOAD_WARN_PER_CPU=2
LOAD_CRIT_PER_CPU=4
